<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./Style2.css" />
  </head>
  <body>
    <div class="one">
      <img src="./Assects/Image/Image.png" alt="logo" />
      <h1>Walchand College of Engineering</h1>
    </div>
    <div class="two">
      <div class="two_1">
        <p id="df">Sign In</p>
      </div>
      <div class="two_2">
        <form id="d">
                <label for="Tag_1">Username *</label>
                <br>
                <br>
                <input type="text" placeholder="Username" id="Tag_1" size="50"> 
                <br>
                <br>         
                <label for="Tag_2" >Password *</label>
                <br>
                <br>
                <input type="text" placeholder="Password" id="Tag_2" size="50"> 
                <br> 
                <br>        
                <label for="Tag_3">Verify Capcha *</label>
                <br>
                <br>  
                <img src="./Assects/Image/CAPTCHA-1000-x-700-copy.jpg" alt="captcha" height="100" width="1000">
               
                <input type="text" placeholder="Enter Capcha" id="Tag_3" size="50"> 
                <br>  
                <br>     
               </form>
      </div>
      <div class="two_3">
        <label for="Tag_4"></label>
        <input type="submit" id="Tag_4">
      </div>
      <div class="two_4">
        <h4 id="dp">Forgot Password</h4>
      </div>
    </div>
  </body>
</html>
